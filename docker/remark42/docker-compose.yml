services:
  remark42:
    image: ghcr.io/umputun/remark42:latest
    container_name: "remark42"
    hostname: "remark42"
    restart: always

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # 포트 직접 노출 없음 — Caddy 리버스 프록시가 처리
    expose:
      - "8080"

    environment:
      - REMARK_URL=https://comments.junghanacs.com
      - SECRET=${SECRET}
      - SITE=notes,www
      # SSL은 Caddy가 처리
      - SSL_TYPE=none
      - ALLOWED_HOSTS=comments.junghanacs.com,notes.junghanacs.com,www.junghanacs.com
      # Auth providers
      - AUTH_GITHUB_CID=${AUTH_GITHUB_CID}
      - AUTH_GITHUB_CSEC=${AUTH_GITHUB_CSEC}
      - AUTH_GOOGLE_CID=${AUTH_GOOGLE_CID}
      - AUTH_GOOGLE_CSEC=${AUTH_GOOGLE_CSEC}
      - AUTH_TELEGRAM=true
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - AUTH_ANON=true
      # 봇멘트 전용 Dev auth (Caddy에서 외부 차단)
      - AUTH_DEV=true
      # Admin
      - ADMIN_SHARED_ID=${ADMIN_SHARED_ID}
      - ADMIN_SHARED_EMAIL=${ADMIN_SHARED_EMAIL}
      - ADMIN_PASSWD=${SECRET}

    # Dev auth가 자기 자신의 OAuth 서버(8084)에 접근하도록
    # comments.junghanacs.com을 내부 IP로 해석 (외부 DNS 우회)
    extra_hosts:
      - "comments.junghanacs.com:127.0.0.1"

    volumes:
      - /home/junghan/docker-data/remark42/var:/srv/var

    networks:
      - proxy

networks:
  proxy:
    external: true   # Caddy가 생성한 네트워크
