services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-custom:latest
    container_name: "openclaw-gateway"
    restart: unless-stopped
    init: true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # Node.js 22 undiciк°Җ IPv6 мҡ°м„  мӢңлҸ„ вҶ’ Oracle Cloudм—җм„ң fetch мӢӨнҢЁ
    # Telegram мқҙлҜём§Җ лӢӨмҡҙлЎңл“ң л“ұ мҷёл¶Җ API нҳём¶ңм—җ мҳҒн–Ҙ
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    dns:
      - 8.8.8.8
      - 8.8.4.4

    # localhostл§Ң л°”мқёл”© (SSH н„°л„җлЎң м ‘к·ј)
    ports:
      - "127.0.0.1:18789:18789"

    env_file: .env
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1  # м„ңлёҢм—җмқҙм „нҠё ws:// Docker bridge н—Ҳмҡ©
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # doctor --deep к¶ҢмһҘ (Oracle ARM small host) вҖ” 5.2 л¶ҖнҢ…/CLI к°ҖмҶҚ, side-effect м—ҶмқҢ
      - NODE_COMPILE_CACHE=/var/tmp/openclaw-compile-cache
      - OPENCLAW_NO_RESPAWN=1

    # gatewayлҠ” м»Ён…Ңмқҙл„Ҳ лӮҙм—җм„ң lan л°”мқёл”© н•„мҡ”
    command: ["node", "openclaw.mjs", "gateway", "--bind", "lan", "--port", "18789"]

    volumes:
      - ./config:/home/node/.openclaw
      # workspaceлҠ” config/workspace/лЎң нҶөн•© (лі„лҸ„ л§ҲмҡҙнҠё л¶Ҳн•„мҡ”)
      # м§ҖмӢқлІ мқҙмҠӨ/мҪ”л“ңлІ мқҙмҠӨ
      # repos/ghлҠ” rwлЎң к°ңл°© вҖ” git кҙҖлҰ¬ н•ҳм—җ м—җмқҙм „нҠё м§Ғм ‘ нҺём§‘ н—Ҳмҡ© (2026-04-25)
      - ~/repos/gh:/home/node/repos/gh:rw
      - ~/repos/gh:/home/junghan/repos/gh:rw  # ~/.claude absolute symlink compatibility
      - ~/repos/work:/home/node/repos/work:ro
      - ~/repos/3rd:/home/node/repos/3rd:rw
      - ~/org:/home/node/org:ro
      # лҙҮ нҷңлҸҷ кё°лЎқ + org м„ңлёҢл””л үнҶ лҰ¬ rw мҳӨлІ„лқјмқҙл“ң (2026-04-25 нҷ•лҢҖ)
      - ~/org/botlog:/home/node/org/botlog:rw
      - ~/org/llmlog:/home/node/org/llmlog:rw
      - ~/org/meta:/home/node/org/meta:rw
      - ~/org/bib:/home/node/org/bib:rw
      - ~/org/notes:/home/node/org/notes:rw
      # lifetract DBлҠ” SQLite WAL н•„мҡ” вҶ’ rw мҳӨлІ„лқјмқҙл“ң (ro н•ҳмң„кІҪлЎң)
      - ~/repos/gh/self-tracking-data:/home/node/repos/gh/self-tracking-data:rw
      # Google Workspace CLI (gogcli) мқёмҰқ (read-only)
      - ~/.config/gogcli:/home/node/.config/gogcli:ro
      # GitHub CLI мқёмҰқ (read-only)
      - ~/.config/gh:/home/node/.config/gh:ro
      # Claude Code лҹ°нғҖмһ„ (ACPX Claudeмҡ©, rw вҖ” session-env/projects кё°лЎқ н•„мҡ”)
      - ~/.claude:/home/node/.claude
      # Claude ACP skills (лӘЁл“  ACP м„ём…ҳмқҙ кіөмң )
      - ./config/claude-skills:/home/node/.claude/skills:rw
      # л””л°”мқҙмҠӨ мӢқлі„ (м—җмқҙм „нҠё кіөнҶө н•„н„°л§Ғ)
      - ~/.current-device:/home/node/.current-device:ro
      # YouTube мҝ нӮӨ (yt-dlp нҸҙл°ұмҡ©)
      - ~/cookies.txt:/home/node/cookies.txt:ro
      # LanceDB лІЎн„° DB (knowledge-search мҠӨнӮ¬мҡ©)
      - ~/.pi/agent/memory:/home/node/.pi/agent/memory:ro
      - ~/org:/home/node/org:ro
      # Emacs agent-server м—°кІ° (Nix store emacsclient + glibc + мҶҢмј“)
      - /nix/store/86wgxj5p9yry03cg7czian66bvz1r1bj-glibc-2.40-218:/nix/store/86wgxj5p9yry03cg7czian66bvz1r1bj-glibc-2.40-218:ro
      - /nix/store/hs9vi37k7ikrjv72w6mampipxrlr34ya-emacs-nox-30.2:/nix/store/hs9vi37k7ikrjv72w6mampipxrlr34ya-emacs-nox-30.2:ro
      - /run/user/1000/emacs:/run/emacs:ro

    networks:
      - default        # CLI м»Ён…Ңмқҙл„ҲмҷҖ нҶөмӢ мҡ©
      - proxy          # Caddy лҰ¬лІ„мҠӨ н”„лЎқмӢң м ‘к·јмҡ©

  openclaw-cli:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-custom:latest
    container_name: "openclaw-cli"
    profiles: ["cli"]
    stdin_open: true
    tty: true

    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    dns:
      - 8.8.8.8
      - 8.8.4.4

    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - BROWSER=echo
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD}

    entrypoint: ["node", "openclaw.mjs"]

    volumes:
      - ./config:/home/node/.openclaw
      # м§ҖмӢқлІ мқҙмҠӨ/мҪ”л“ңлІ мқҙмҠӨ
      # repos/ghлҠ” rwлЎң к°ңл°© вҖ” git кҙҖлҰ¬ н•ҳм—җ м—җмқҙм „нҠё м§Ғм ‘ нҺём§‘ н—Ҳмҡ© (2026-04-25)
      - ~/repos/gh:/home/node/repos/gh:rw
      - ~/repos/gh:/home/junghan/repos/gh:rw  # ~/.claude absolute symlink compatibility
      - ~/repos/work:/home/node/repos/work:ro
      - ~/repos/3rd:/home/node/repos/3rd:rw
      - ~/org:/home/node/org:ro
      # лҙҮ нҷңлҸҷ кё°лЎқ + org м„ңлёҢл””л үнҶ лҰ¬ rw мҳӨлІ„лқјмқҙл“ң (2026-04-25 нҷ•лҢҖ)
      - ~/org/botlog:/home/node/org/botlog:rw
      - ~/org/llmlog:/home/node/org/llmlog:rw
      - ~/org/meta:/home/node/org/meta:rw
      - ~/org/bib:/home/node/org/bib:rw
      - ~/org/notes:/home/node/org/notes:rw
      # lifetract DBлҠ” SQLite WAL н•„мҡ” вҶ’ rw мҳӨлІ„лқјмқҙл“ң (ro н•ҳмң„кІҪлЎң)
      - ~/repos/gh/self-tracking-data:/home/node/repos/gh/self-tracking-data:rw
      # Google Workspace CLI (gogcli) мқёмҰқ (read-only)
      - ~/.config/gogcli:/home/node/.config/gogcli:ro
      # GitHub CLI мқёмҰқ (read-only)
      - ~/.config/gh:/home/node/.config/gh:ro
      # Claude Code лҹ°нғҖмһ„ (ACPX Claudeмҡ©, rw вҖ” session-env/projects кё°лЎқ н•„мҡ”)
      - ~/.claude:/home/node/.claude
      # Claude ACP skills (лӘЁл“  ACP м„ём…ҳмқҙ кіөмң )
      - ./config/claude-skills:/home/node/.claude/skills:rw
      # л””л°”мқҙмҠӨ мӢқлі„ (м—җмқҙм „нҠё кіөнҶө н•„н„°л§Ғ)
      - ~/.current-device:/home/node/.current-device:ro
      # YouTube мҝ нӮӨ (yt-dlp нҸҙл°ұмҡ©)
      - ~/cookies.txt:/home/node/cookies.txt:ro
      # LanceDB лІЎн„° DB (knowledge-search мҠӨнӮ¬мҡ©)
      - ~/.pi/agent/memory:/home/node/.pi/agent/memory:ro
      - ~/org:/home/node/org:ro
      # Emacs agent-server м—°кІ° (Nix store emacsclient + glibc + мҶҢмј“)
      - /nix/store/86wgxj5p9yry03cg7czian66bvz1r1bj-glibc-2.40-218:/nix/store/86wgxj5p9yry03cg7czian66bvz1r1bj-glibc-2.40-218:ro
      - /nix/store/hs9vi37k7ikrjv72w6mampipxrlr34ya-emacs-nox-30.2:/nix/store/hs9vi37k7ikrjv72w6mampipxrlr34ya-emacs-nox-30.2:ro
      - /run/user/1000/emacs:/run/emacs:ro

networks:
  proxy:
    external: true   # Caddyк°Җ мғқм„ұн•ң л„ӨнҠёмӣҢнҒ¬
