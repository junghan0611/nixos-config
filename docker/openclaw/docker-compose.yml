services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-custom:latest
    container_name: "openclaw-gateway"
    restart: unless-stopped
    init: true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # Node.js 22 undici가 IPv6 우선 시도 → Oracle Cloud에서 fetch 실패
    # Telegram 이미지 다운로드 등 외부 API 호출에 영향
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    dns:
      - 8.8.8.8
      - 8.8.4.4

    # localhost만 바인딩 (SSH 터널로 접근)
    ports:
      - "127.0.0.1:18789:18789"

    env_file: .env
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1  # 서브에이전트 ws:// Docker bridge 허용
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # doctor --deep 권장 (Oracle ARM small host) — 5.2 부팅/CLI 가속, side-effect 없음
      - NODE_COMPILE_CACHE=/var/tmp/openclaw-compile-cache
      - OPENCLAW_NO_RESPAWN=1
      # ACP route (bbot) child spawn 보강 — pi-shell-acp #21 consumer-side workaround.
      # pi-shell-acp claude-plugin이 child env를 비워두는 자리 (issue #21) 해소.
      # ① CLI skill bin parent dir 7개 prepend — gitcli/denotecli/lifetract/gog 등 bare 호출이 PATH로 잡히도록.
      # ② Nix store emacsclient — emacs SKILL.md bare 호출 해소. nix store hash는 volumes mount와 동기화.
      # ③ PI_EMACS_AGENT_SOCKET — emacs SKILL.md가 명시한 contract ("injected by pi-shell-acp when launched with --emacs-agent-socket"). server 소켓 (/run/emacs/server) 활성.
      # claude-cli provider needs `claude` on PATH; SDK ships binary at `/app/node_modules/@anthropic-ai/claude-agent-sdk-linux-arm64/claude` (no auto-symlink). Without this entry the `spawn("claude", ...)` from `dist/cli-backend-CO2SZJAY.js` ENOENTs → child exits ~4ms → parent stdin write hits EPIPE.
      - PATH=/app/node_modules/@anthropic-ai/claude-agent-sdk-linux-arm64:/home/junghan/.pi/agent/claude-plugin/skills/bibcli:/home/junghan/.pi/agent/claude-plugin/skills/denotecli:/home/junghan/.pi/agent/claude-plugin/skills/dictcli:/home/junghan/.pi/agent/claude-plugin/skills/gitcli:/home/junghan/.pi/agent/claude-plugin/skills/gogcli:/home/junghan/.pi/agent/claude-plugin/skills/lifetract:/home/junghan/.pi/agent/claude-plugin/skills/semantic-memory:/nix/store/flz7vwvzin0wpsrmrxymzlg1jn840ck9-emacs-nox-30.2/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # short name "server"는 ${XDG_RUNTIME_DIR}/emacs/server 또는 /tmp/emacs<uid>/server에서 찾음.
      # 컨테이너 mount는 /run/emacs/server라 short name resolution 실패 → full path 명시.
      - PI_EMACS_AGENT_SOCKET=/run/emacs/server

    # gateway는 컨테이너 내에서 lan 바인딩 필요
    command: ["node", "openclaw.mjs", "gateway", "--bind", "lan", "--port", "18789"]

    volumes:
      - ./config:/home/node/.openclaw
      # 5.12 신규: OAuth profile secret key persistence (XDG 표준 경로)
      # OpenClaw 코드는 두 candidate를 순회: ① $HOME/.config/openclaw/auth-profile-secret-key (XDG, first priority)
      # ② $HOME/.openclaw-auth-profile-secrets/auth-profile-secret-key (fallback)
      # 그리고 stateDir(=/home/node/.openclaw) 외부에만 저장 — secret이 state backup/sync에 같이 끌려가지 않게.
      # 컨테이너 ephemeral에 두면 매 recreate마다 새 key 생성 → 기존 OAuth profile decrypt 실패 → harness 미등록.
      - ./auth-profile-secrets:/home/node/.config/openclaw
      # workspace는 config/workspace/로 통합 (별도 마운트 불필요)
      # 지식베이스/코드베이스
      # repos/gh는 rw로 개방 — git 관리 하에 에이전트 직접 편집 허용 (2026-04-25)
      - ~/repos/gh:/home/node/repos/gh:rw
      - ~/repos/gh:/home/junghan/repos/gh:rw  # ~/.claude absolute symlink compatibility
      - ~/repos/work:/home/node/repos/work:ro
      - ~/repos/3rd:/home/node/repos/3rd:rw
      - ~/org:/home/node/org:ro
      # 봇 활동 기록 + org 서브디렉토리 rw 오버라이드 (2026-04-25 확대)
      - ~/org/botlog:/home/node/org/botlog:rw
      - ~/org/llmlog:/home/node/org/llmlog:rw
      - ~/org/meta:/home/node/org/meta:rw
      - ~/org/bib:/home/node/org/bib:rw
      - ~/org/notes:/home/node/org/notes:rw
      # lifetract DB는 SQLite WAL 필요 → rw 오버라이드 (ro 하위경로)
      - ~/repos/gh/self-tracking-data:/home/node/repos/gh/self-tracking-data:rw
      # Google Workspace CLI (gogcli) 인증 (read-only)
      - ~/.config/gogcli:/home/node/.config/gogcli:ro
      # GitHub CLI 인증 (read-only)
      - ~/.config/gh:/home/node/.config/gh:ro
      # Claude Code 런타임 (ACPX Claude용, rw — session-env/projects 기록 필요)
      - ~/.claude:/home/node/.claude
      # Claude ACP skills (모든 ACP 세션이 공유)
      - ./config/claude-skills:/home/node/.claude/skills:rw
      # 디바이스 식별 (에이전트 공통 필터링)
      - ~/.current-device:/home/node/.current-device:ro
      # YouTube 쿠키 (yt-dlp 폴백용)
      - ~/cookies.txt:/home/node/cookies.txt:ro
      # pi-shell-acp host overlay passthrough (Phase 1.8 β, trusted single-user)
      # ~/.pi/agent 전체 rw — child pi가 sessions/cache/resolver state write 필요.
      # 이전 memory:ro 항목 흡수 (knowledge-search 스킬도 같은 path).
      - ~/.pi/agent:/home/node/.pi/agent:rw
      # host absolute path 호환성: settings.json의 skillPlugins / mcpServers.command가
      # /home/junghan/.pi/... 로 박혀 있어서 동일 dir을 두 path로 노출 (~/repos/gh 패턴).
      - ~/.pi/agent:/home/junghan/.pi/agent:rw
      # backend CLI auth — host passthrough (β). plugin은 token 만지지 않음 (invariant).
      - ~/.codex:/home/node/.codex:rw
      - ~/.gemini:/home/node/.gemini:rw
      - ~/org:/home/node/org:ro
      # Emacs agent-server 연결 (Nix store emacsclient + glibc + 소켓)
      # ⚠️ Nix store hash hardcoded — NixOS rebuild 시 갱신 의무.
      # 갱신 절차: `readlink -f /run/current-system/sw/bin/emacsclient` → emacs hash,
      # `ldd <emacsclient> | grep libc` → glibc hash. 두 자리 volumes + PATH 두 서비스 모두 일관 갱신.
      - /nix/store/jjjpj4p9bz505ac1c747f2j5z3xw170p-glibc-2.40-224:/nix/store/jjjpj4p9bz505ac1c747f2j5z3xw170p-glibc-2.40-224:ro
      - /nix/store/flz7vwvzin0wpsrmrxymzlg1jn840ck9-emacs-nox-30.2:/nix/store/flz7vwvzin0wpsrmrxymzlg1jn840ck9-emacs-nox-30.2:ro
      - /run/user/1000/emacs:/run/emacs:ro

    networks:
      - default        # CLI 컨테이너와 통신용
      - proxy          # Caddy 리버스 프록시 접근용

  openclaw-cli:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-custom:latest
    container_name: "openclaw-cli"
    profiles: ["cli"]
    stdin_open: true
    tty: true

    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    dns:
      - 8.8.8.8
      - 8.8.4.4

    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - BROWSER=echo
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD}
      # ACP route child spawn 보강 — gateway service와 동일 (pi-shell-acp #21 consumer-side workaround)
      # claude-cli provider needs `claude` on PATH; SDK ships binary at `/app/node_modules/@anthropic-ai/claude-agent-sdk-linux-arm64/claude` (no auto-symlink). Without this entry the `spawn("claude", ...)` from `dist/cli-backend-CO2SZJAY.js` ENOENTs → child exits ~4ms → parent stdin write hits EPIPE.
      - PATH=/app/node_modules/@anthropic-ai/claude-agent-sdk-linux-arm64:/home/junghan/.pi/agent/claude-plugin/skills/bibcli:/home/junghan/.pi/agent/claude-plugin/skills/denotecli:/home/junghan/.pi/agent/claude-plugin/skills/dictcli:/home/junghan/.pi/agent/claude-plugin/skills/gitcli:/home/junghan/.pi/agent/claude-plugin/skills/gogcli:/home/junghan/.pi/agent/claude-plugin/skills/lifetract:/home/junghan/.pi/agent/claude-plugin/skills/semantic-memory:/nix/store/flz7vwvzin0wpsrmrxymzlg1jn840ck9-emacs-nox-30.2/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # short name "server"는 ${XDG_RUNTIME_DIR}/emacs/server 또는 /tmp/emacs<uid>/server에서 찾음.
      # 컨테이너 mount는 /run/emacs/server라 short name resolution 실패 → full path 명시.
      - PI_EMACS_AGENT_SOCKET=/run/emacs/server

    entrypoint: ["node", "openclaw.mjs"]

    volumes:
      - ./config:/home/node/.openclaw
      # 5.12 신규: OAuth profile secret key persistence (XDG, gateway와 공유)
      - ./auth-profile-secrets:/home/node/.config/openclaw
      # 지식베이스/코드베이스
      # repos/gh는 rw로 개방 — git 관리 하에 에이전트 직접 편집 허용 (2026-04-25)
      - ~/repos/gh:/home/node/repos/gh:rw
      - ~/repos/gh:/home/junghan/repos/gh:rw  # ~/.claude absolute symlink compatibility
      - ~/repos/work:/home/node/repos/work:ro
      - ~/repos/3rd:/home/node/repos/3rd:rw
      - ~/org:/home/node/org:ro
      # 봇 활동 기록 + org 서브디렉토리 rw 오버라이드 (2026-04-25 확대)
      - ~/org/botlog:/home/node/org/botlog:rw
      - ~/org/llmlog:/home/node/org/llmlog:rw
      - ~/org/meta:/home/node/org/meta:rw
      - ~/org/bib:/home/node/org/bib:rw
      - ~/org/notes:/home/node/org/notes:rw
      # lifetract DB는 SQLite WAL 필요 → rw 오버라이드 (ro 하위경로)
      - ~/repos/gh/self-tracking-data:/home/node/repos/gh/self-tracking-data:rw
      # Google Workspace CLI (gogcli) 인증 (read-only)
      - ~/.config/gogcli:/home/node/.config/gogcli:ro
      # GitHub CLI 인증 (read-only)
      - ~/.config/gh:/home/node/.config/gh:ro
      # Claude Code 런타임 (ACPX Claude용, rw — session-env/projects 기록 필요)
      - ~/.claude:/home/node/.claude
      # Claude ACP skills (모든 ACP 세션이 공유)
      - ./config/claude-skills:/home/node/.claude/skills:rw
      # 디바이스 식별 (에이전트 공통 필터링)
      - ~/.current-device:/home/node/.current-device:ro
      # YouTube 쿠키 (yt-dlp 폴백용)
      - ~/cookies.txt:/home/node/cookies.txt:ro
      # pi-shell-acp host overlay passthrough (Phase 1.8 β, trusted single-user)
      # ~/.pi/agent 전체 rw — child pi가 sessions/cache/resolver state write 필요.
      # 이전 memory:ro 항목 흡수 (knowledge-search 스킬도 같은 path).
      - ~/.pi/agent:/home/node/.pi/agent:rw
      # host absolute path 호환성: settings.json의 skillPlugins / mcpServers.command가
      # /home/junghan/.pi/... 로 박혀 있어서 동일 dir을 두 path로 노출 (~/repos/gh 패턴).
      - ~/.pi/agent:/home/junghan/.pi/agent:rw
      # backend CLI auth — host passthrough (β). plugin은 token 만지지 않음 (invariant).
      - ~/.codex:/home/node/.codex:rw
      - ~/.gemini:/home/node/.gemini:rw
      - ~/org:/home/node/org:ro
      # Emacs agent-server 연결 (Nix store emacsclient + glibc + 소켓)
      # ⚠️ Nix store hash hardcoded — NixOS rebuild 시 갱신 의무.
      # 갱신 절차: `readlink -f /run/current-system/sw/bin/emacsclient` → emacs hash,
      # `ldd <emacsclient> | grep libc` → glibc hash. 두 자리 volumes + PATH 두 서비스 모두 일관 갱신.
      - /nix/store/jjjpj4p9bz505ac1c747f2j5z3xw170p-glibc-2.40-224:/nix/store/jjjpj4p9bz505ac1c747f2j5z3xw170p-glibc-2.40-224:ro
      - /nix/store/flz7vwvzin0wpsrmrxymzlg1jn840ck9-emacs-nox-30.2:/nix/store/flz7vwvzin0wpsrmrxymzlg1jn840ck9-emacs-nox-30.2:ro
      - /run/user/1000/emacs:/run/emacs:ro

networks:
  proxy:
    external: true   # Caddy가 생성한 네트워크
